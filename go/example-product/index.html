<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>Redirecting... | My Links</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="You are being redirected.">
  
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Analytics 4 - PASTE YOUR GA4 ID HERE: G-XXXXXXXXXX -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  
  <!-- Styles (inline for redirect page) -->
  <style>
    /* ============================================
       REDIRECT PAGE STYLES
       ============================================ */
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --accent: #00c853;
      --accent-glow: rgba(0, 200, 83, 0.3);
      --border: #222222;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }
    
    .redirect-container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    
    /* Spinner Animation */
    .redirect-spinner {
      width: 56px;
      height: 56px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Brand Logo */
    .brand-logo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Redirect Text */
    .redirect-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    
    .redirect-text {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    
    .redirect-brand {
      color: var(--accent);
      font-weight: 600;
    }
    
    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      animation: progress 1.5s ease-out forwards;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    
    @keyframes progress {
      to {
        width: 100%;
      }
    }
    
    /* Manual Redirect Link */
    .manual-redirect {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .manual-redirect a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    
    .manual-redirect a:hover {
      text-decoration: underline;
    }
    
    /* Footer */
    .redirect-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    
    .redirect-footer p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      .redirect-spinner {
        animation: none;
        border-top-color: var(--accent);
      }
      
      .progress-bar {
        animation: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="redirect-container">
    <!-- Brand Logo -->
    <div class="brand-logo">My Links</div>
    
    <!-- Loading Spinner -->
    <div class="redirect-spinner" aria-hidden="true"></div>
    
    <!-- Redirect Message -->
    <h1 class="redirect-title">Redirecting you...</h1>
    <p class="redirect-text">
      Taking you to your <span class="redirect-brand">destination</span>
    </p>
    
    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    
    <!-- Manual Redirect (fallback) -->
    <p class="manual-redirect">
      Not redirecting? <a href="#" id="manual-link">Click here</a>
    </p>
    
    <!-- Footer -->
    <div class="redirect-footer">
      <p>Affiliate links support our content at no extra cost to you.</p>
    </div>
  </div>

  <!-- Redirect Script -->
  <script>
    // ============================================
    // REDIRECT CONFIGURATION
    // Edit these values for each redirect page
    // ============================================
    
    const CONFIG = {
      // Your actual affiliate link
      redirectUrl: '#YOUR_REDIRECT_URL_HERE',
      
      // Product name for tracking
      productName: 'Your Product',
      
      // Delay in milliseconds (1.5 seconds)
      delay: 1500
    };
    
    // ============================================
    // TRACKING & REDIRECT LOGIC
    // ============================================
    
    // Update manual link
    document.getElementById('manual-link').href = CONFIG.redirectUrl;
    
    // Fire GA4 event and redirect
    setTimeout(() => {
      // Track the redirect event
      if (typeof gtag === 'function') {
        gtag('event', 'affiliate_redirect', {
          product: CONFIG.productName,
          destination: CONFIG.redirectUrl,
          timestamp: new Date().toISOString()
        });
        
        console.log('[GA4 Event] affiliate_redirect:', {
          product: CONFIG.productName,
          destination: CONFIG.redirectUrl
        });
      }
      
      // Perform the redirect
      window.location.href = CONFIG.redirectUrl;
    }, CONFIG.delay);
    
    // Also track page view of redirect page
    if (typeof gtag === 'function') {
      gtag('event', 'redirect_page_view', {
        product: CONFIG.productName
      });
    }
  </script>
</body>
</html>
